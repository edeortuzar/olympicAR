<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Olimpiadas AR</title>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a; color: #fff;
      overflow: hidden; height: 100vh; width: 100vw;
    }

    /* ── Splash ── */
    #splash {
      position: fixed; inset: 0; z-index: 100;
      background: linear-gradient(160deg, #0d0d1a 0%, #001a33 50%, #0a1a0a 100%);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 1.5rem; padding: 2rem; text-align: center;
    }
    .splash-rings { position: relative; width: 120px; height: 80px; flex-shrink: 0; }
    .ring { position: absolute; width: 48px; height: 48px; border-radius: 50%; border: 5px solid transparent; }
    .ring:nth-child(1) { border-color: #0085C7; top:0; left:0; }
    .ring:nth-child(2) { border-color: #fff;    top:0; left:36px; }
    .ring:nth-child(3) { border-color: #DF0024; top:0; left:72px; }
    .ring:nth-child(4) { border-color: #F4C300; top:24px; left:18px; }
    .ring:nth-child(5) { border-color: #009F3D; top:24px; left:54px; }
    #splash h1 {
      font-size: clamp(1.4rem,5vw,2rem); font-weight: 700;
      background: linear-gradient(135deg,#fff 0%,#aac8ff 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    #splash p { font-size: .9rem; color: rgba(255,255,255,.6); max-width: 320px; line-height: 1.5; }

    .marker-list {
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      border-radius: 16px; padding: 1rem 1.25rem; width: 100%; max-width: 340px; text-align: left;
    }
    .marker-list h3 { font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; color: rgba(255,255,255,.4); margin-bottom: .6rem; }
    .marker-item { display: flex; align-items: center; gap: .65rem; padding: .4rem 0; border-bottom: 1px solid rgba(255,255,255,.06); font-size: .85rem; }
    .marker-item:last-child { border-bottom: none; }
    .marker-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .dot-0{background:#0085C7;} .dot-1{background:#F4C300;} .dot-2{background:#DF0024;}
    .dot-3{background:#009F3D;} .dot-4{background:#fff;}    .dot-5{background:#ff6b35;}

    #btn-start {
      background: #0085C7; color: #fff; border: none; border-radius: 50px;
      padding: 1rem 2.5rem; font-size: 1rem; font-weight: 600; cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,133,199,.4); min-height: 52px;
    }

    /* ── AR container ── */
    #ar-container { display: none; position: fixed; inset: 0; }

    /* ── WebM overlay — aparece centrado sobre la cámara ── */
    #webm-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 35;
      align-items: center; justify-content: center;
      pointer-events: none;
      background: transparent;
    }
    #webm-overlay.active { display: flex; }
    #webm-overlay video {
      max-width: 88vw;
      max-height: 55vh;
      object-fit: contain;
      border-radius: 12px;
    }

    /* ── HUD ── */
    #ar-hud {
      display: none; position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
      z-index: 40; background: rgba(0,0,0,.6); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.15); border-radius: 50px;
      padding: .5rem 1.25rem; font-size: .8rem; color: rgba(255,255,255,.85);
      pointer-events: none; white-space: nowrap; max-width: 90vw;
    }
    .dot-pulse {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: #0f0; margin-right: 6px; vertical-align: middle;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

    #btn-exit-ar {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      z-index: 40; display: none;
      background: rgba(0,0,0,.6); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.2); color: #fff;
      border-radius: 50px; padding: .6rem 1.5rem; cursor: pointer; font-size: .85rem; min-height: 44px;
    }

    #toast {
      position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%) translateY(20px);
      z-index: 45; background: rgba(0,133,199,.9); color: #fff;
      border-radius: 50px; padding: .6rem 1.4rem; font-size: .85rem; font-weight: 500;
      opacity: 0; transition: opacity .3s, transform .3s; pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <!-- PANTALLA DE INICIO -->
  <div id="splash">
    <div class="splash-rings">
      <div class="ring"></div><div class="ring"></div><div class="ring"></div>
      <div class="ring"></div><div class="ring"></div>
    </div>
    <h1>Villa Olímpica AR</h1>
    <p>Apuntá la cámara a las figuras del mural para ver cada deporte en acción.</p>
    <div class="marker-list">
      <h3>Figuras del mural</h3>
      <div class="marker-item"><span class="marker-dot dot-0"></span><span>🏃 Atletismo</span></div>
      <div class="marker-item"><span class="marker-dot dot-1"></span><span>🏀 Básquet</span></div>
      <div class="marker-item"><span class="marker-dot dot-2"></span><span>⚾ Béisbol</span></div>
      <div class="marker-item"><span class="marker-dot dot-3"></span><span>🏊 Natación</span></div>
      <div class="marker-item"><span class="marker-dot dot-4"></span><span>🏐 Vóley</span></div>
      <div class="marker-item"><span class="marker-dot dot-5"></span><span>🥋 Taekwondo</span></div>
    </div>
    <button id="btn-start" onclick="startAR()">📷 Activar cámara AR</button>
  </div>

  <!-- ESCENA AR -->
  <div id="ar-container">
    <a-scene id="ar-scene"
      mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">
      <a-assets></a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- 6 markers — planos invisibles, el video se muestra en HTML overlay -->
      <a-entity mindar-image-target="targetIndex: 0" id="target-0">
        <a-plane position="0 0 0" height="0.01" width="0.01" material="opacity:0"></a-plane>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 1" id="target-1">
        <a-plane position="0 0 0" height="0.01" width="0.01" material="opacity:0"></a-plane>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 2" id="target-2">
        <a-plane position="0 0 0" height="0.01" width="0.01" material="opacity:0"></a-plane>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 3" id="target-3">
        <a-plane position="0 0 0" height="0.01" width="0.01" material="opacity:0"></a-plane>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 4" id="target-4">
        <a-plane position="0 0 0" height="0.01" width="0.01" material="opacity:0"></a-plane>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 5" id="target-5">
        <a-plane position="0 0 0" height="0.01" width="0.01" material="opacity:0"></a-plane>
      </a-entity>
    </a-scene>
  </div>

  <!-- WebM overlay — un solo elemento de video que cambia de src -->
  <div id="webm-overlay">
    <video id="webm-player"
      autoplay loop playsinline webkit-playsinline
      muted
      preload="none">
    </video>
  </div>

  <!-- HUD y controles -->
  <div id="ar-hud"><span class="dot-pulse"></span>Buscando figuras del mural...</div>
  <button id="btn-exit-ar" onclick="exitAR()">✕ Salir de AR</button>
  <div id="toast"></div>

  <script>
    /* ══════════════════════════════════════════
       CONFIGURACIÓN — un WebM por marker
    ══════════════════════════════════════════ */
    /* Detectar iOS — WebM no funciona en ningún browser iOS */
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    const MARKERS = [
      { label: "Atletismo",  webm: "atletismo.webm",     mp4: "atletismo.mp4"     },
      { label: "Básquet",    webm: "basquet.webm",       mp4: "basquet.mp4"       },
      { label: "Béisbol",    webm: "beisbol_alpha.webm", mp4: "beisbol_alpha.mp4" },
      { label: "Natación",   webm: "natacion.webm",      mp4: "natacion.mp4"      },
      { label: "Vóley",      webm: "voley.webm",         mp4: "voley.mp4"         },
      { label: "Taekwondo",  webm: "taekwondo.webm",     mp4: "taekwondo.mp4"     }
    ];

    /* ── Estado ── */
    let sceneEl, mindarSystem;
    let activeMarker = -1;
    const player = document.getElementById('webm-player');
    const overlay = document.getElementById('webm-overlay');
    const hud     = document.getElementById('ar-hud');

    /* ── AR Init ── */
    function startAR() {
      document.getElementById('splash').style.display = 'none';
      document.getElementById('ar-container').style.display = 'block';
      hud.style.display = 'block';
      document.getElementById('btn-exit-ar').style.display = 'block';

      sceneEl = document.getElementById('ar-scene');

      for (let i = 0; i < MARKERS.length; i++) {
        document.getElementById(`target-${i}`)
          .addEventListener('targetFound', () => onFound(i));
        document.getElementById(`target-${i}`)
          .addEventListener('targetLost',  () => onLost(i));
      }

      function boot() {
        mindarSystem = sceneEl.systems['mindar-image-system'];
        if (!mindarSystem) { setTimeout(boot, 200); return; }
        mindarSystem.start()
          .then(() => showToast('Cámara lista 🎯'))
          .catch(err => {
            console.error(err);
            hud.innerHTML = '⚠️ Error al iniciar AR';
          });
      }

      sceneEl.hasLoaded ? boot() : sceneEl.addEventListener('loaded', boot, { once: true });
    }

    /* ── Marker detectado ── */
    function onFound(i) {
      activeMarker = i;
      hud.innerHTML = `<span class="dot-pulse"></span>${MARKERS[i].label} detectado`;

      /* Elegir formato según dispositivo */
      const src = isIOS ? MARKERS[i].mp4 : MARKERS[i].webm;

      if (player.dataset.current !== src) {
        player.src = src;
        player.dataset.current = src;
        player.load();
      }
      player.play().catch(e => console.warn('play:', e));
      overlay.classList.add('active');
    }

    /* ── Marker perdido ── */
    function onLost(i) {
      if (activeMarker === i) {
        activeMarker = -1;
        overlay.classList.remove('active');
        player.pause();
        hud.innerHTML = `<span class="dot-pulse"></span>Buscando figuras del mural...`;
      }
    }

    /* ── Salir ── */
    function exitAR() {
      overlay.classList.remove('active');
      player.pause();
      player.src = '';
      player.dataset.current = '';
      activeMarker = -1;
      if (mindarSystem) mindarSystem.stop();
      document.getElementById('ar-container').style.display = 'none';
      hud.style.display = 'none';
      document.getElementById('btn-exit-ar').style.display = 'none';
      document.getElementById('splash').style.display = 'flex';
    }

    /* ── Toast ── */
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
